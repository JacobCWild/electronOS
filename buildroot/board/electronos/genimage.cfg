# ============================================================================
# electronOS SD Card Image Layout
# ============================================================================
# Partition 1: boot    (FAT32, 256MB) — firmware, kernel, DTBs
# Partition 2: rootfs  (ext4, 2GB)    — root filesystem
# Partition 3: data    (ext4, rest)   — encrypted user data (LUKS)
# ============================================================================

image boot.vfat {
    vfat {
        files = {
            "bcm2712-rpi-5-b.dtb",
            "Image",
            "config.txt",
            "cmdline.txt"
        }
    }
    size = 256M
}

image rootfs.ext4 {
    ext4 {
        label = "electronos-root"
        use-default-uidgid = true
    }
    size = 2G
}

image sdcard.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition boot {
        partition-type-uuid = C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        image = "boot.vfat"
        offset = 1M
        bootable = true
    }

    partition rootfs {
        partition-type-uuid = B921B045-1DF0-41C3-AF44-4C6F280D3FAE
        image = "rootfs.ext4"
    }

    partition data {
        partition-type-uuid = 933AC7E1-2EB4-4F13-B844-0E14E2AEF915
        size = 512M
    }
}
