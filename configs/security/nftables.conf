#!/usr/sbin/nft -f
# ============================================================================
# electronOS Firewall Rules (nftables)
# ============================================================================
# Default-deny incoming policy with stateful connection tracking.
# Inspired by macOS Application Firewall behavior.
# ============================================================================

flush ruleset

table inet electronos_firewall {
    # ---- Rate limiting sets -----------------------------------------------
    set rate_limit_ssh {
        type ipv4_addr
        flags dynamic,timeout
        timeout 60s
    }

    set blocked_ips {
        type ipv4_addr
        flags dynamic,timeout
        timeout 3600s
    }

    # ---- Input chain (incoming traffic) -----------------------------------
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow loopback
        iif "lo" accept

        # Drop invalid connections
        ct state invalid drop

        # Allow established/related connections
        ct state established,related accept

        # ICMP: allow ping with rate limiting
        ip protocol icmp icmp type echo-request \
            limit rate 5/second burst 10 packets accept
        ip6 nexthdr icmpv6 icmpv6 type { echo-request } \
            limit rate 5/second burst 10 packets accept

        # ICMPv6 essential types (neighbor discovery, etc.)
        ip6 nexthdr icmpv6 icmpv6 type {
            nd-neighbor-solicit,
            nd-neighbor-advert,
            nd-router-solicit,
            nd-router-advert
        } accept

        # SSH: rate limited (max 3 new connections per minute per IP)
        tcp dport 22 ct state new \
            add @rate_limit_ssh { ip saddr limit rate 3/minute burst 5 packets } \
            accept

        # Drop and log everything else
        log prefix "electronOS-DROP: " flags all \
            limit rate 5/minute burst 10 packets
        counter drop
    }

    # ---- Forward chain (routed traffic) -----------------------------------
    chain forward {
        type filter hook forward priority filter; policy drop;

        # No forwarding by default (not a router)
        counter drop
    }

    # ---- Output chain (outgoing traffic) ----------------------------------
    chain output {
        type filter hook output priority filter; policy accept;

        # Allow all outgoing by default
        # Can be restricted per-application in the future

        # Block outgoing to known malicious IPs (populated dynamically)
        ip daddr @blocked_ips drop
    }
}
