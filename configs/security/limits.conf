# ============================================================================
# electronOS — Resource Limits (/etc/security/limits.conf)
# ============================================================================
# Prevents resource exhaustion attacks (fork bombs, memory hogging, etc.)
# ============================================================================

# Default limits for all users
*               soft    core            0
*               hard    core            0
*               soft    nproc           256
*               hard    nproc           512
*               soft    nofile          4096
*               hard    nofile          8192
*               soft    memlock         65536
*               hard    memlock         131072
*               soft    as              4194304
*               hard    as              8388608

# Root gets higher limits
root            soft    nproc           unlimited
root            hard    nproc           unlimited
root            soft    nofile          65536
root            hard    nofile          65536

# Guest account — more restrictive
guest           soft    nproc           64
guest           hard    nproc           128
guest           soft    nofile          1024
guest           hard    nofile          2048
guest           soft    as              2097152
guest           hard    as              4194304
